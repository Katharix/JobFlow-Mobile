name: Mobile Prod Release

on:
  push:
    tags:
      - release-*
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (format: release-*)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-release:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

      - name: Validate release tag ref
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_REF" =~ ^release- ]]; then
            echo "Production deployments require a release-* tag."
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  prod-approval:
    name: Manual Approval For Production
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: read
      issues: write

    steps:
      - name: Validate PROD_APPROVERS variable
        env:
          PROD_APPROVERS: ${{ vars.PROD_APPROVERS }}
        run: |
          if [ -z "$PROD_APPROVERS" ]; then
            echo "Set repository variable PROD_APPROVERS to a comma-separated list of GitHub usernames allowed to approve production deploys."
            exit 1
          fi

      - name: Wait for manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: ${{ vars.PROD_APPROVERS }}
          minimum-approvals: 1
          issue-title: "Approve Mobile production deploy"
          issue-body: "Release tag is ready. Approve this production deployment by commenting 'approve'."
          exclude-workflow-initiator-as-approver: false

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: prod-approval
    permissions:
      contents: read
      actions: read
    environment:
      name: Production

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-aab
          path: ./release-artifacts

      - name: Production deployment gate reached
        run: |
          echo "Production approval granted."
          echo "Connect your store deployment step here (Play Store/App Store)."

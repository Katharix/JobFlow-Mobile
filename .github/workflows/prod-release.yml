name: Mobile Prod Release

on:
  push:
    tags:
      - release-*
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (format: release-*)"
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  version-overview:
    name: Version Overview
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve release tag
        id: release-tag
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          echo "value=$RELEASE_REF" >> "$GITHUB_OUTPUT"

      - name: Publish version table
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.value }}
          STAGING_VERSION: ${{ vars.MOBILE_STAGING_VERSION }}
          PROD_VERSION: ${{ vars.MOBILE_PRODUCTION_VERSION }}
        run: |
          [ -n "$STAGING_VERSION" ] || STAGING_VERSION="n/a"
          [ -n "$PROD_VERSION" ] || PROD_VERSION="n/a"

          {
            echo "## Mobile Release Versions"
            echo
            echo "Target release tag: $RELEASE_TAG"
            echo
            echo "| Environment | Current deployed version | Planned action |"
            echo "| --- | --- | --- |"
            echo "| Staging | $STAGING_VERSION | Deploy $RELEASE_TAG |"
            echo "| Production | $PROD_VERSION | Deploy $RELEASE_TAG after approval |"
          } >> "$GITHUB_STEP_SUMMARY"

  build-release:
    name: Build Release Artifact
    needs: version-overview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

      - name: Validate release tag ref
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_REF" =~ ^release- ]]; then
            echo "Production deployments require a release-* tag."
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  deploy-staging:
    name: Deploy to Staging (${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }})
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: read
      actions: write
    environment:
      name: Staging

    steps:
      - name: Resolve release tag
        id: release-tag
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          echo "value=$RELEASE_REF" >> "$GITHUB_OUTPUT"

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-aab
          path: ./release-artifacts

      - name: Staging deployment gate reached
        run: |
          echo "Deploy the artifact in ./release-artifacts to your staging channel here."

      - name: Record staging deployed version
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.value }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const name = 'MOBILE_STAGING_VERSION';
            const value = process.env.RELEASE_TAG;

            try {
              await github.rest.actions.getRepoVariable({ owner, repo, name });
              await github.rest.actions.updateRepoVariable({ owner, repo, name, value });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.actions.createRepoVariable({ owner, repo, name, value });
              } else {
                throw error;
              }
            }

  deploy-prod:
    name: Deploy to Production (${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }})
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions:
      contents: read
      actions: write
    environment:
      name: Production

    steps:
      - name: Resolve release tag
        id: release-tag
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          echo "value=$RELEASE_REF" >> "$GITHUB_OUTPUT"

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-aab
          path: ./release-artifacts

      - name: Production deployment gate reached
        run: |
          echo "Production environment approval granted."
          echo "Connect your store deployment step here (Play Store/App Store)."

      - name: Record production deployed version
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.value }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const name = 'MOBILE_PRODUCTION_VERSION';
            const value = process.env.RELEASE_TAG;

            try {
              await github.rest.actions.getRepoVariable({ owner, repo, name });
              await github.rest.actions.updateRepoVariable({ owner, repo, name, value });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.actions.createRepoVariable({ owner, repo, name, value });
              } else {
                throw error;
              }
            }

  publish-version-table:
    name: Publish Final Version Table
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - deploy-staging
      - deploy-prod
    permissions:
      contents: read
    steps:
      - name: Resolve release tag
        id: release-tag
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          echo "value=$RELEASE_REF" >> "$GITHUB_OUTPUT"

      - name: Publish final deployment table
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.value }}
          STAGING_VERSION: ${{ needs.deploy-staging.result == 'success' && steps.release-tag.outputs.value || vars.MOBILE_STAGING_VERSION }}
          PROD_VERSION: ${{ needs.deploy-prod.result == 'success' && steps.release-tag.outputs.value || vars.MOBILE_PRODUCTION_VERSION }}
          STAGING_STATUS: ${{ needs.deploy-staging.result }}
          PROD_STATUS: ${{ needs.deploy-prod.result }}
        run: |
          [ -n "$STAGING_VERSION" ] || STAGING_VERSION="n/a"
          [ -n "$PROD_VERSION" ] || PROD_VERSION="n/a"

          {
            echo "## Final Mobile Version Table"
            echo
            echo "Release tag: $RELEASE_TAG"
            echo
            echo "| Environment | Deployed version | Job status |"
            echo "| --- | --- | --- |"
            echo "| Staging | $STAGING_VERSION | $STAGING_STATUS |"
            echo "| Production | $PROD_VERSION | $PROD_STATUS |"
          } >> "$GITHUB_STEP_SUMMARY"
